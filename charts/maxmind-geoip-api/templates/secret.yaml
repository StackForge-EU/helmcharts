{{- if and .Values.maxmind.dbUrl (not .Values.maxmind.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "maxmind-geoip-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "maxmind-geoip-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  MAXMIND_DB_URL: {{ .Values.maxmind.dbUrl | quote }}
{{- end }}
