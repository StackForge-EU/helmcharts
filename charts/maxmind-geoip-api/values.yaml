image:
  repository: stefansundin/maxmind-geoip-api
  tag: v1.1.0
  pullPolicy: IfNotPresent

replicaCount: 1

# MaxMind database download URL
# The API container downloads and auto-updates the database every 24 hours
maxmind:
  dbUrl: ""
  # Use an existing Secret instead of creating one.
  # The secret must contain a key named MAXMIND_DB_URL (or the key specified in existingSecretKey).
  existingSecret: ""
  # Override the key in the existing Secret to read from.
  existingSecretKey: "MAXMIND_DB_URL"

service:
  create: true
  type: ClusterIP
  port: 80
  # The container listens on port 80 by default
  containerPort: 80

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteMany
  size: 128Mi

networkPolicy:
  create: false
  ingress:
    limit: false
    from:
      - podSelector: {}
  egress:
    limit: false
    to:
      - podSelector: {}

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Use the official MaxMind geoipupdate tool for database updates
geoipupdate:
  enabled: true
  image:
    repository: ghcr.io/maxmind/geoipupdate
    tag: v7.1
    pullPolicy: IfNotPresent
  accountId: ""
  licenseKey: ""
  editionId: "GeoLite2-City"
  # Use an existing Secret instead of creating one.
  # The secret must contain a key named GeoIP.conf.
  existingSecret: ""
  # Run an initial download Job before the deployment is ready
  initJob: true
  # Run periodic updates via CronJob
  cronJob:
    enabled: true
    schedule: "0 0 * * 0"

