{{- if and .Values.geoipupdate.enabled (not .Values.persistence.enabled) }}
{{- fail "persistence.enabled must be true when geoipupdate.enabled is true" }}
{{- end }}
{{- if and .Values.geoipupdate.enabled .Values.geoipupdate.initJob }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "maxmind-geoip-api.fullname" . }}-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "maxmind-geoip-api.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "maxmind-geoip-api.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      volumes:
        - name: config
          secret:
            secretName: {{ include "maxmind-geoip-api.geoipupdate.secretName" . }}
            items:
              - key: GeoIP.conf
                path: GeoIP.conf
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "maxmind-geoip-api.fullname" . }}-data
      containers:
        - name: geoip-updater
          image: "{{ .Values.geoipupdate.image.repository }}:{{ .Values.geoipupdate.image.tag }}"
          imagePullPolicy: {{ .Values.geoipupdate.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              /usr/bin/geoipupdate -d /data -f /etc/geoip/GeoIP.conf
              mv /data/{{ .Values.geoipupdate.editionId }}.mmdb /data/database.mmdb
          volumeMounts:
            - name: config
              mountPath: /etc/geoip
              readOnly: true
            - name: data
              mountPath: /data
{{- end }}
