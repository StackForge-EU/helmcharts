apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maxmind-geoip-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "maxmind-geoip-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "maxmind-geoip-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "maxmind-geoip-api.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "maxmind-geoip-api.fullname" . }}-data
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.containerPort }}
              name: http
              protocol: TCP
          {{- if and (not .Values.geoipupdate.enabled) (or .Values.maxmind.dbUrl .Values.maxmind.existingSecret) }}
          env:
            - name: MAXMIND_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "maxmind-geoip-api.secretName" . }}
                  key: {{ .Values.maxmind.existingSecretKey | default "MAXMIND_DB_URL" }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          livenessProbe:
            httpGet:
              path: /metadata
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metadata
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
